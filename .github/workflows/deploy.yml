name: Deploy MkDocs (GitHub Pages + Self-hosted)

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache MkDocs build
        uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ github.run_id }}
          path: .cache
          restore-keys: mkdocs-material-

      - name: Install dependencies
        run: |
          pip install mkdocs-material \
                      mkdocs-awesome-pages-plugin \
                      mkdocs-glightbox \
                      jieba

      - name: Build site
        run: mkdocs build

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force --no-rebuild

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to self-hosted server
        run: rsync -az --delete ./site/ root@${{ secrets.DEPLOY_HOST }}:/var/www/sao-wiki/
